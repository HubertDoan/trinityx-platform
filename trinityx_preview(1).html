// ─── CSS ─────────────────────────────────────────────────────────────────────
const css = `
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #22c55e; --green-dark: #16a34a; --green-light: #4ade80;
    --red: #ef4444; --gold: #f59e0b; --gold-light: #fcd34d; --blue: #3b82f6;
    --bg: #0a0f0a; --bg2: #0f1a0f; --bg3: #162416; --card: #111a11;
    --border: #1e3a1e; --border2: #2d4a2d;
    --text: #e8f5e9; --text2: #9dbf9d; --text3: #6b9b6b;

    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body { background:var(--bg); color:var(--text); font-family:'Be Vietnam Pro',sans-serif; min-height:100vh; }
  h1,h2,h3,h4 { font-family:'Exo 2',sans-serif; }
  input,select,textarea { outline:none; }
  button { cursor:pointer; border:none; }
  a { text-decoration:none; }
  ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg2); } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

  /* LANDING */
  .landing { min-height:100vh; }
  .nav { display:flex; align-items:center; justify-content:space-between; padding:14px 40px; border-bottom:1px solid var(--border); background:rgba(10,15,10,0.95); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
  .nav-logo { display:flex; align-items:center; gap:10px; }
  .nav-logo-text { font-family:'Exo 2',sans-serif; font-size:22px; font-weight:800; }
  .nav-logo-text span { color:var(--red); }
  .nav-logo-sub { font-size:9px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; display:block; margin-top:-2px; }
  .nav-links { display:flex; gap:24px; align-items:center; }
  .nav-link { color:var(--text2); font-size:13px; font-weight:500; transition:color .2s; background:none; border:none; cursor:pointer; padding:0; }
  .nav-link:hover { color:var(--green); }
  .nav-actions { display:flex; gap:10px; }
  .btn { padding:9px 20px; border-radius:8px; font-size:13px; font-weight:600; transition:all .2s; font-family:'Be Vietnam Pro',sans-serif; }
  .btn-outline { background:transparent; border:1.5px solid var(--green); color:var(--green); }
  .btn-outline:hover { background:var(--green); color:var(--bg); }
  .btn-primary { background:var(--green); color:var(--bg); border:none; }
  .btn-primary:hover { background:var(--green-light); transform:translateY(-1px); }
  .btn-gold { background:var(--gold); color:var(--bg); border:none; }
  .btn-danger { background:var(--red); color:#fff; border:none; }
  .btn-ghost { background:transparent; color:var(--text2); padding:8px 14px; border-radius:8px; border:none; }
  .btn-ghost:hover { background:var(--bg3); color:var(--text); }
  .btn-sm { padding:6px 12px; font-size:12px; }
  .btn-full { width:100%; display:block; text-align:center; padding:12px; border-radius:10px; font-size:14px; }
  .store-nav-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(245,158,11,0.08)); border:1px solid rgba(34,197,94,0.25); color:var(--text); cursor:pointer; transition:all .2s; }
  .store-nav-btn:hover { border-color:var(--green); }
  .store-nav-btn span { color:var(--green); }

  .hero { padding:80px 40px 60px; position:relative; overflow:hidden; }
  .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(34,197,94,0.07) 0%, transparent 70%); pointer-events:none; }
  .hero-inner { display:flex; align-items:center; gap:40px; max-width:1200px; margin:0 auto; }
  .hero-text { flex:1; min-width:0; }
  .hero-logo-col { width:240px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .hero-logo-img { width:220px; height:220px; object-fit:contain; filter:drop-shadow(0 0 24px rgba(34,197,94,0.4)); border-radius:16px; }
  .hero-mascot-img { width:190px; object-fit:contain; filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5)); animation:mascot-float 3s ease-in-out infinite; }
  @keyframes mascot-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .hero-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:20px; padding:5px 14px; font-size:12px; color:var(--green); margin-bottom:20px; }
  .hero h1 { font-size:clamp(28px,5vw,60px); font-weight:900; line-height:1.1; margin-bottom:18px; }
  .hero h1 span { color:var(--green); }
  .hero p { font-size:16px; color:var(--text2); max-width:540px; margin:0 0 32px; line-height:1.7; }
  .hero-actions { display:flex; gap:12px; flex-wrap:wrap; }
  .hero-actions .btn { padding:13px 30px; font-size:14px; border-radius:10px; }
  @media(max-width:768px) { .hero-inner{flex-direction:column;text-align:center;} .hero-logo-col{flex-direction:row;width:100%;justify-content:center;} .hero-logo-img{width:130px;height:130px;} .hero-mascot-img{width:120px;} .hero-actions{justify-content:center;} .hero p{margin:0 auto 32px;} }
  .stats-bar { display:flex; justify-content:center; gap:0; margin:50px 0 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .stat-item { flex:1; max-width:180px; padding:24px 16px; text-align:center; border-right:1px solid var(--border); }

  .stat-num { font-family:'Exo 2',sans-serif; font-size:28px; font-weight:800; color:var(--green); }
  .stat-label { font-size:11px; color:var(--text3); margin-top:4px; }
  .section { padding:56px 40px; max-width:1100px; margin:0 auto; }
  .section-title { font-size:26px; font-weight:800; margin-bottom:8px; }

  .level-card.innovator::before { background:radial-gradient(circle at top right, rgba(239,68,68,0.08), transparent 60%); }
  .level-card:hover { border-color:var(--border2); transform:translateY(-4px); box-shadow:var(--shadow); }
  .level-card:hover::before { opacity:1; }
  .level-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; }
  .badge-starter { background:rgba(34,197,94,0.15); color:var(--green); }
  .badge-creator { background:rgba(245,158,11,0.15); color:var(--gold); }
  .badge-innovator { background:rgba(239,68,68,0.15); color:var(--red); }
  .level-card h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
  .level-card p { color:var(--text2); font-size:12px; line-height:1.6; margin-bottom:14px; }
  .level-detail { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text3); margin-top:4px; }
  .level-detail span { color:var(--text2); }
  .messages-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
  .msg-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; border-left:3px solid var(--green); }
  .msg-card p { color:var(--text2); font-size:13px; line-height:1.7; font-style:italic; }
  .msg-card strong { color:var(--green-light); font-style:normal; }

  /* AUTH */
  .auth-page { min-height:100vh; display:flex; flex-direction:column; }
  .auth-container { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }

  .role-tabs { display:flex; background:var(--bg2); border-radius:9px; padding:3px; margin-bottom:24px; }

  .demo-hint { background:rgba(34,197,94,0.05); border:1px solid rgba(34,197,94,0.2); border-radius:7px; padding:10px 12px; margin-top:14px; font-size:11px; color:var(--text2); }
  .demo-hint strong { color:var(--green); }

  /* DASHBOARD */
  .app { display:flex; min-height:100vh; }
  .sidebar { width:232px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:50; transition:transform .3s; }
  .sidebar-logo { padding:18px 18px 14px; border-bottom:1px solid var(--border); }
  .sidebar-nav { flex:1; padding:14px 10px; overflow-y:auto; }

  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; font-family:'Exo 2',sans-serif; flex-shrink:0; }
  .avatar-parent { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:#fff; }

  .user-name { font-size:12px; font-weight:600; }
  .user-role { font-size:10px; color:var(--text3); }
  .main { margin-left:232px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:40; }
  .topbar-title { font-family:'Exo 2',sans-serif; font-size:17px; font-weight:700; }
  .notif-btn { position:relative; background:none; border:none; color:var(--text2); padding:5px; border-radius:7px; cursor:pointer; }
  .notif-btn:hover { color:var(--text); background:var(--bg3); }
  .notif-dot { position:absolute; top:3px; right:3px; width:7px; height:7px; background:var(--red); border-radius:50%; }
  .content { padding:24px; flex:1; }
  .page-header { margin-bottom:24px; }
  .page-title { font-size:22px; font-weight:800; }
  .page-sub { color:var(--text2); font-size:13px; margin-top:3px; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; display:flex; align-items:center; gap:14px; }
  .stat-icon { width:40px; height:40px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .icon-green { background:rgba(34,197,94,0.12); color:var(--green); }
  .icon-gold { background:rgba(245,158,11,0.12); color:var(--gold); }
  .icon-red { background:rgba(239,68,68,0.12); color:var(--red); }
  .icon-blue { background:rgba(59,130,246,0.12); color:#60a5fa; }
  .icon-purple { background:rgba(168,85,247,0.12); color:#c084fc; }
  .stat-card-val { font-family:'Exo 2',sans-serif; font-size:24px; font-weight:800; line-height:1; }
  .stat-card-label { font-size:11px; color:var(--text2); margin-top:3px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }

  /* STORE */

// ─── NEWS SECTION ─────────────────────────────────────────────────────────────
function NewsSection({ onNavigate }) {
  const [filter, setFilter] = useState("all");
  const [applying, setApplying] = useState(null);
  const tagFilters = [
    {id:"all",label:"Tất cả"},
    {id:"course",label:"🎓 Khóa học"},
    {id:"event",label:"🎪 Sự kiện"},
    {id:"recruit_volunteer",label:"🙋 Tuyển CTV"},
    {id:"recruit_parent",label:"👨‍👩‍👧 Tuyển PH"},
    {id:"competition",label:"🏆 Thi đấu"},
    {id:"robotic",label:"🤖 Robotic"},
    {id:"recruit_competition",label:"⭐ Đội tuyển"},
  ];
  const tagClass = {course:"tag-course",event:"tag-event",recruit_volunteer:"tag-volunteer",recruit_parent:"tag-parent",competition:"tag-competition",robotic:"tag-robotic",recruit_competition:"tag-volunteer"};
  const filtered = filter==="all" ? NEWS_FEED : NEWS_FEED.filter(n=>n.type===filter);
  const handleCTA = (news) => {
    if (news.ctaRole==="student"||news.ctaRole==="parent"||news.ctaRole==="volunteer") {
      setApplying(news);
    } else {
      onNavigate("register");
    }
  };
  return (
    <div className="news-section">
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
          <div>
            <div className="section-title" style={{marginBottom:4}}>Tin tức & Thông báo</div>
            <div className="section-sub" style={{marginBottom:0}}>Cập nhật mới nhất về khóa học, sự kiện, tuyển dụng và hoạt động TrinityX</div>
          </div>
        </div>
        <div className="news-tabs">
          {tagFilters.map(f=><button key={f.id} className={`news-tab${filter===f.id?" active":""}`} onClick={()=>setFilter(f.id)}>{f.label}</button>)}
        </div>
        <div className="news-grid">
          {filtered.map(n=>(
            <div key={n.id} className={`news-card${n.urgent?" urgent":""}`}>
              {n.urgent && <div className="urgent-dot"/>}
              <div className={`news-tag ${tagClass[n.type]||"tag-event"}`}>{n.tag}</div>
              <div className="news-icon">{n.icon}</div>
              <div className="news-title">{n.title}</div>
              <div className="news-desc">{n.desc}</div>
              <div className="news-footer">
                <div className="news-date">📅 {n.date}</div>
                <button className="news-cta" onClick={()=>handleCTA(n)}>{n.cta}</button>
              </div>
            </div>
          ))}
        </div>

        {/* Robotic events section */}
        <div style={{marginTop:48}}>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:20,fontWeight:800,marginBottom:6}}>🤖 Lịch thi đấu Robotic 2026</div>
          <div style={{fontSize:13,color:"var(--text2)",marginBottom:20}}>Các giải đấu robotic lớn trong năm — TrinityX đồng hành và hỗ trợ học sinh tham gia</div>
          <div className="robotic-grid">
            {ROBOTIC_EVENTS.map(r=>(
              <div key={r.id} className="robotic-card" style={{borderLeft:`3px solid ${r.color}`}}>
                <div className="robotic-level" style={{background:`${r.color}18`,color:r.color}}>{r.level}</div>
                <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:14,fontWeight:700,marginBottom:6,lineHeight:1.4}}>{r.name}</div>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:8,lineHeight:1.6}}>{r.desc}</div>
                <div style={{fontSize:10,color:"var(--text3)",display:"flex",gap:10,flexWrap:"wrap"}}>
                  <span>📅 {r.date}</span>
                  <span>🏅 {r.prize}</span>
                </div>
                <div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:9,color:r.color,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>{r.org}</span>
                  <span style={{padding:"2px 8px",borderRadius:10,fontSize:9,fontWeight:700,background:`${r.color}18`,color:r.color}}>{r.status}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Apply modal */}
      {applying && (
        <div className="modal-overlay" onClick={()=>setApplying(null)}>
          <div className="modal-box" style={{padding:28,maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>{applying.icon}</div>
            <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:18,fontWeight:800,textAlign:"center",marginBottom:6}}>{applying.title}</div>
            <div style={{fontSize:13,color:"var(--text2)",textAlign:"center",marginBottom:20,lineHeight:1.6}}>{applying.desc}</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-outline btn-full" onClick={()=>setApplying(null)}>Đóng</button>
              <button className="btn btn-primary btn-full" onClick={()=>{setApplying(null);onNavigate("register");}}>Đăng ký ngay</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function LoginPage({ onLogin, onNavigate }) {
  const [role, setRole] = useState("student");
  const [code, setCode] = useState(""); const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false); const [error, setError] = useState("");
  const roles = [
    {id:"student",label:"🎓 Học sinh"},
    {id:"parent",label:"👨‍👩‍👧 Phụ huynh"},
    {id:"mentor",label:"💡 Mentor"},
    {id:"teacher",label:"📚 Thầy cô"},
    {id:"volunteer",label:"🙋 CTV"},
    {id:"director",label:"🏢 Giám đốc"},
    {id:"staff",label:"👔 Nhân viên"},
    {id:"admin",label:"⚙️ Admin HT"},
  ];
  const ROLE_CODES = {
    student:"hs001", parent:"ph001", mentor:"mentor001",
    teacher:"teacher001", volunteer:"ctv001", manager:"manager001", admin:"admin001"
  };
  const ROLE_PASSWORDS = {
    student:"123456", parent:"123456", mentor:"mentor123",
    teacher:"teacher123", volunteer:"ctv123", manager:"manager123", admin:"admin123"
  };
  const handleLogin = () => {
    setError("");
    const user = MOCK_USERS[code.trim()];
    if (!user || user.password !== pw) { setError("Mã đăng nhập hoặc mật khẩu không đúng"); return; }
    if (role === "admin" && user.role !== "admin") { setError("Mã này không phải tài khoản Admin"); return; }
    else if (role === "director" && user.role !== "director") { setError("Mã này không phải tài khoản Giám đốc"); return; }
    else if (role === "staff" && user.role !== "staff") { setError("Mã này không phải tài khoản Nhân viên"); return; }
    else if (role === "mentor" && user.role !== "mentor") { setError("Mã này không phải tài khoản Mentor"); return; }
    else if (role === "teacher" && user.role !== "teacher") { setError("Mã này không phải tài khoản Thầy/Cô"); return; }
    else if (role === "volunteer" && user.role !== "volunteer") { setError("Mã này không phải tài khoản CTV"); return; }
    else if (role === "student" && user.role !== "student") { setError("Mã này không phải tài khoản học sinh"); return; }
    else if (role === "parent" && user.role !== "parent") { setError("Mã này không phải tài khoản phụ huynh"); return; }
    onLogin(user);
  };
  return (
    <div className="auth-page">
      <nav className="nav">
        <div className="nav-logo" style={{cursor:"pointer"}} onClick={()=>onNavigate("landing")}>
          <Icon.logo size={40}/><div><div className="nav-logo-text">TRINITY<span>X</span></div><div className="nav-logo-sub">trinityx.net</div></div>
        </div>
      </nav>
      <div className="auth-container">
        <div className="auth-box">
          <div className="auth-header"><Icon.logo size={48}/><h2>Đăng nhập TrinityX</h2><p>Chào mừng trở lại hệ sinh thái giáo dục sáng tạo</p></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",background:"var(--bg2)",borderRadius:9,padding:3,marginBottom:18,gap:2}}>
            {roles.slice(0,4).map(r=>(
              <button key={r.id} className={`role-tab ${role===r.id?"active":""}`} style={{fontSize:11,padding:"7px 4px"}} onClick={()=>setRole(r.id)}>{r.label}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",background:"var(--bg2)",borderRadius:9,padding:3,marginBottom:18,gap:2}}>
            {roles.slice(4).map(r=>(
              <button key={r.id} className={`role-tab ${role===r.id?"active":""}`} style={{fontSize:11,padding:"7px 4px"}} onClick={()=>setRole(r.id)}>{r.label}</button>
            ))}
          </div>
          <div className="form-group">
            <label className="form-label">Mã {role==="student"?"học sinh":role==="parent"?"phụ huynh":"Admin"}</label>
            <input className="form-input" placeholder={role==="admin"?"admin001":"Nhập mã đăng nhập"} value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          </div>
          <div className="form-group">
            <label className="form-label">Mật khẩu</label>
            <div className="input-wrap">
              <input className="form-input" type={showPw?"text":"password"} placeholder="Nhập mật khẩu" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              <button className="input-eye" onClick={()=>setShowPw(!showPw)}>{showPw?<Icon.eyeOff/>:<Icon.eye/>}</button>
            </div>
          </div>
          {error && <div className="form-error">{error}</div>}
          <button className="btn btn-primary btn-full" onClick={handleLogin}>Đăng nhập</button>
          <div className="demo-hint">
            <strong>Demo:</strong> HS: <strong>hs001</strong>/123456 · PH: <strong>ph001</strong>/123456 · Mentor: <strong>mentor001</strong>/mentor123 · CTV: <strong>ctv001</strong>/ctv123<br/>
            GĐ HQ: <strong>director001</strong>/director123 · GĐ CN: <strong>director002</strong>/director123 · NV: <strong>staff001–004</strong>/staff123 · Admin: <strong>admin001</strong>/admin123
          </div>
          <div className="auth-footer">Chưa có tài khoản? <a onClick={()=>onNavigate("register")}>Đăng ký ngay</a></div>
        </div>
      </div>
    </div>
  );

// ─── CHATBOT ─────────────────────────────────────────────────────────────────
function Chatbot() {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{from:"bot",text:"Xin chào! Tôi là AI hỗ trợ TrinityX 24/7 🤖\nBạn muốn hỏi gì về chương trình học, sự kiện hay TXP Points?"}]);
  const [input, setInput] = useState("");
  const suggestions = ["Chương trình học","TXP Points","Doanh thu 70%","Thi đấu","Địa chỉ TrinityX"];
  const messagesEndRef = useRef(null);
  const getReply = (q) => {
    const lq = q.toLowerCase();
    for (const [kw, ans] of Object.entries(CHATBOT_KNOWLEDGE)) {
      if (lq.includes(kw)) return ans;
    }
    return "Tôi chưa có thông tin về câu hỏi này. Bạn có thể liên hệ trực tiếp TrinityX qua:\n📞 0384101895\n📧 Home@trinityx.net\nhoặc thử hỏi: chương trình học, TXP Points, doanh thu, thi đấu, địa chỉ.";
  };
  const send = (text) => {
    const q = text || input.trim();
    if (!q) return;
    setMsgs(m=>[...m,{from:"user",text:q}]);
    setInput("");
    setTimeout(()=>{
      setMsgs(m=>[...m,{from:"bot",text:getReply(q)}]);
    }, 600);
  };
  useEffect(()=>{ messagesEndRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);
  return (
    <>
      {open && (
        <div className="chatbot-window slide-up">
          <div className="chatbot-header">
            <div className="chatbot-avatar">🤖</div>
            <div><div className="chatbot-title">TrinityX AI Assistant</div><div className="chatbot-sub">● Online 24/7</div></div>
            <button onClick={()=>setOpen(false)} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18}}>×</button>
          </div>
          <div className="chatbot-messages">
            {msgs.map((m,i)=>(
              <div key={i} className={m.from==="bot"?"msg-bot":"msg-user"} style={{whiteSpace:"pre-line"}}>{m.text}</div>
            ))}
            <div ref={messagesEndRef}/>
          </div>
          <div className="chatbot-suggestions">
            {suggestions.map(s=><button key={s} className="chatbot-sug" onClick={()=>send(s.toLowerCase())}>{s}</button>)}
          </div>
          <div className="chatbot-input">
            <input placeholder="Hỏi gì đó..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
            <button className="chatbot-send" onClick={()=>send()}>
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--bg)" strokeWidth="2" style={{width:14,height:14}}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
            </button>
          </div>
        </div>
      )}
      <button className="chatbot-fab" onClick={()=>setOpen(!open)}>
        {open ? <span style={{color:"var(--bg)",fontSize:20}}>×</span> : <svg viewBox="0 0 24 24" fill="none" stroke="var(--bg)" strokeWidth="2" style={{width:22,height:22}}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>}
      </button>
    </>
  );
}

function PointsPage({ user, isParent }) {
  const levelInfo = [{name:"Starter",min:0,max:200,color:"var(--green)"},{name:"Creator",min:200,max:500,color:"var(--gold)"},{name:"Innovator",min:500,max:1000,color:"var(--red)"}];
  const current = levelInfo.find(l=>user.txpPoints>=l.min&&user.txpPoints<l.max)||levelInfo[2];
  const pct = Math.min(100,((user.txpPoints-current.min)/(current.max-current.min))*100);
  return <>
    <div className="page-header"><div className="page-title">TXP Points</div><div className="page-sub">Hệ thống điểm thưởng — ghi nhận mọi đóng góp</div></div>

            <div className="progress-info"><span style={{fontSize:12}}>Cấp {current.name}</span><span style={{fontSize:11,color:"var(--text3)"}}>{user.txpPoints}/{current.max}</span></div>
            <div className="progress-bar" style={{height:9}}><div className="progress-fill fill-green" style={{width:`${pct}%`}}/></div>
          </div>
          <div style={{fontSize:11,color:"var(--text2)",textAlign:"center"}}>Cần thêm <strong style={{color:current.color}}>{current.max-user.txpPoints} điểm</strong> để lên cấp {levelInfo[levelInfo.indexOf(current)+1]?.name||"tối đa"}</div>
        </div>
        <div className="card">
          <div className="card-title">Cách kiếm điểm</div>
          {[
            ["Hoàn thành sản phẩm","+50 TXP"],["Bán được sản phẩm","+100 TXP"],

            <div key={act} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
              <span>{act}</span><span style={{color:"var(--green)",fontWeight:700}}>{pts}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-title">Các mốc cấp độ</div>
        {levelInfo.map((l,i)=>(
          <div key={l.name} style={{padding:14,background:user.txpPoints>=l.min?"rgba(34,197,94,0.05)":"var(--bg2)",borderRadius:"var(--radius)",border:`1px solid ${user.txpPoints>=l.min?"rgba(34,197,94,0.25)":"var(--border)"}`,marginBottom:10}}>

              {user.txpPoints>=l.min&&<span style={{display:"flex",alignItems:"center",gap:4,color:"var(--green)",fontSize:11}}><Icon.check/>Đạt được</span>}

// ─── USER MANAGEMENT PAGE ─────────────────────────────────────────────────────
function UserManagementPage({ directorMode, managerMode, centerCode, pendingData, onUpdatePending, createdUsersData, onUpdateCreatedUsers }) {
  const [pendingList, setPendingList] = useState(pendingData || INITIAL_PENDING);
  const [activeTab, setActiveTab] = useState("pending");
  const [showCreate, setShowCreate] = useState(false);
  const [createForm, setCreateForm] = useState({name:"",email:"",phone:"",role:"student",center:"TRX-HN02",password:""});
  const [createdUsers, setCreatedUsers] = useState(createdUsersData || []);
  const [editPw, setEditPw] = useState(null);
  const [newPw, setNewPw] = useState("");
  const roleLabels = {
    student:"Học sinh", parent:"Phụ huynh", mentor:"Mentor",
    volunteer:"CTV", teacher:"Thầy/Cô", manager:"Quản lý vận hành",
    director:"Giám đốc", admin_staff:"NV Hành chính",
    tech_staff:"NV Kỹ thuật", sales_staff:"NV Bán hàng", warehouse_staff:"Quản lý Kho",
    parent_volunteer:"Phụ huynh TN",
  };
  const staffRoles = ["director","admin_staff","tech_staff","sales_staff","warehouse_staff","teacher","mentor","volunteer","manager"];  const pending = pendingList.filter(p=>p.status==="pending");
  const all = pendingList.filter(p=>p.status!=="pending");

  const approve = (id) => {
    const newList = pendingList.map(p=>p.id===id?{...p,status:"approved"}:p);
    setPendingList(newList);
    if(onUpdatePending) onUpdatePending(newList);
  };
  const reject = (id) => {
    const newList = pendingList.map(p=>p.id===id?{...p,status:"rejected"}:p);
    setPendingList(newList);
    if(onUpdatePending) onUpdatePending(newList);
  };
  const createUser = () => {
    const code = createForm.role.slice(0,2)+String(Math.floor(Math.random()*900)+100);
    const newU = {...createForm,id:code,userCode:`TRX-${createForm.role.toUpperCase().slice(0,3)}-${code}`,created:new Date().toLocaleDateString("vi-VN")};
    const newList = [newU,...createdUsers];
    setCreatedUsers(newList);
    if(onUpdateCreatedUsers) onUpdateCreatedUsers(newList);
    setShowCreate(false);
    setCreateForm({name:"",email:"",phone:"",role:"student",center:"TRX-HN02",password:""});
  };

  return <>
    <div className="page-header">
      <div className="page-title">Quản lý nhân sự & người dùng</div>
      <div className="page-sub">{directorMode ? `Trung tâm ${centerCode||""} · Phê duyệt đăng ký, tạo & quản lý tài khoản` : "Admin hệ thống · Toàn bộ người dùng · Phê duyệt & cấp quyền"}</div>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
      {[["pending",`Chờ duyệt (${pending.length})`],["all","Đã xử lý"],["created","Tài khoản đã tạo"]].map(([id,lbl])=>(
        <button key={id} className={`filter-btn${activeTab===id?" active":""}`} onClick={()=>setActiveTab(id)}>{lbl}</button>
      ))}
      <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={()=>setShowCreate(true)}>+ Tạo tài khoản mới</button>
    </div>

    {activeTab==="pending" && (
      <div className="card">
        <div className="card-title">Yêu cầu đăng ký chờ phê duyệt
          {pending.length>0 && <span style={{background:"var(--red)",color:"#fff",padding:"1px 8px",borderRadius:10,fontSize:10,fontWeight:700}}>{pending.length} mới</span>}
        </div>
        {pending.length===0 ? (
          <div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>✅ Không có đăng ký chờ duyệt</div>
        ) : (
          pending.map(p=>(
            <div key={p.id} className="user-mgmt-row">
              <div className="avatar avatar-student" style={{width:36,height:36,fontSize:13,flexShrink:0}}>{p.name.charAt(0)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:600}}>{p.name}</span>
                  <span className={`role-chip role-${p.role==="parent_volunteer"?"volunteer":p.role}`}>{roleLabels[p.role==="parent_volunteer"?"volunteer":p.role]||p.role}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text2)"}}>{p.email} · {p.phone} · {p.center}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:2,fontStyle:"italic"}}>"{p.msg}"</div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button className="action-btn action-approve" onClick={()=>approve(p.id)}>✅ Duyệt</button>
                <button className="action-btn action-reject" onClick={()=>reject(p.id)}>❌ Từ chối</button>
              </div>
            </div>
          ))
        )}
      </div>
    )}

    {activeTab==="all" && (
      <div className="card">
        <div className="card-title">Lịch sử xử lý đăng ký</div>
        {all.map(p=>(
          <div key={p.id} className="user-mgmt-row">
            <div className="avatar avatar-student" style={{width:32,height:32,fontSize:11,flexShrink:0}}>{p.name.charAt(0)}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600}}>{p.name}</div>
              <div style={{fontSize:10,color:"var(--text2)"}}>{roleLabels[p.role]||p.role} · {p.center} · {p.date}</div>
            </div>
            <span className={`pending-badge pending-status-${p.status}`}>{p.status==="approved"?"✅ Đã duyệt":"❌ Từ chối"}</span>
          </div>
        ))}
      </div>
    )}

    {activeTab==="created" && (
      <div className="card">
        <div className="card-title">Tài khoản đã tạo thủ công</div>
        {createdUsers.length===0 ? (
          <div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>Chưa có tài khoản nào được tạo thủ công</div>
        ) : (
          createdUsers.map((u,i)=>(
            <div key={i} className="user-mgmt-row">
              <div className="avatar avatar-student" style={{width:32,height:32,fontSize:11,flexShrink:0}}>{u.name.charAt(0)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600}}>{u.name}</div>
                <div style={{fontSize:10,color:"var(--text2)"}}>{u.id} · {u.email} · {u.center}</div>
              </div>
              <div style={{display:"flex",gap:5}}>
                <button className="action-btn action-edit" onClick={()=>{setEditPw(u);setNewPw("");}}>✏️ Đổi mật khẩu</button>
              </div>
            </div>
          ))
        )}
      </div>
    )}

    {/* Create user modal */}
    {showCreate && (
      <div className="create-user-modal" onClick={()=>setShowCreate(false)}>
        <div className="create-user-box" onClick={e=>e.stopPropagation()}>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:18,fontWeight:800,marginBottom:20}}>+ Tạo tài khoản mới</div>
          {[["name","Họ và tên","text"],["email","Email","email"],["phone","Số điện thoại","text"],["password","Mật khẩu tạm","text"]].map(([k,lbl,type])=>(
            <div key={k} className="form-group">
              <label className="form-label">{lbl}</label>
              <input className="form-input" type={type} value={createForm[k]} onChange={e=>setCreateForm(f=>({...f,[k]:e.target.value}))}/>
            </div>
          ))}
          <div className="form-group">
            <label className="form-label">Vai trò</label>
            <select className="form-input" value={createForm.role} onChange={e=>setCreateForm(f=>({...f,role:e.target.value}))}>
              <optgroup label="— Nhân sự TrinityX —">
                <option value="director">Giám đốc</option>
                <option value="admin_staff">NV Hành chính</option>
                <option value="tech_staff">NV Kỹ thuật</option>
                <option value="sales_staff">NV Bán hàng</option>
                <option value="warehouse_staff">Quản lý Kho</option>
              </optgroup>
              <optgroup label="— Chương trình học —">
                <option value="teacher">Thầy/Cô hướng dẫn CLB</option>
                <option value="mentor">Mentor</option>
                <option value="volunteer">CTV tình nguyện</option>
              </optgroup>
              <optgroup label="— Học viên —">
                <option value="student">Học sinh</option>
                <option value="parent">Phụ huynh</option>
              </optgroup>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Trung tâm</label>
            <select className="form-input" value={createForm.center} onChange={e=>setCreateForm(f=>({...f,center:e.target.value}))}>
              <option value="TRX-HN01">TrinityX Thanh Xuân</option>
              <option value="TRX-HN02">TrinityX Đông Anh</option>
            </select>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn btn-ghost btn-full" onClick={()=>setShowCreate(false)}>Hủy</button>
            <button className="btn btn-primary btn-full" onClick={createUser} disabled={!createForm.name||!createForm.email||!createForm.password}>Tạo tài khoản</button>
          </div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:10,textAlign:"center"}}>Sau khi tạo, hệ thống sẽ gửi thông tin đăng nhập qua email của người dùng.</div>
        </div>
      </div>
    )}

    {/* Change password modal */}
    {editPw && (
      <div className="create-user-modal" onClick={()=>setEditPw(null)}>
        <div className="create-user-box" style={{maxHeight:"unset",padding:24}} onClick={e=>e.stopPropagation()}>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:16,fontWeight:800,marginBottom:16}}>✏️ Đổi mật khẩu — {editPw.name}</div>
          <div className="form-group">
            <label className="form-label">Mật khẩu mới</label>
            <input className="form-input" type="text" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="Nhập mật khẩu mới"/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn btn-ghost btn-full" onClick={()=>setEditPw(null)}>Hủy</button>
            <button className="btn btn-primary btn-full" disabled={!newPw} onClick={()=>{alert(`✅ Đã đổi mật khẩu cho ${editPw.name}`);setEditPw(null);}}>Lưu mật khẩu</button>
          </div>
        </div>
      </div>
    )}
  </>;
}

// ─── LOCAL STORAGE HELPERS ────────────────────────────────────────────────────
const LS = {
  get: (key, fallback) => {
    try { const v = localStorage.getItem("trx_"+key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set: (key, val) => {
    try { localStorage.setItem("trx_"+key, JSON.stringify(val)); } catch {}
  },
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("landing");
  const [user, setUser] = useState(null);
  const [usersData, setUsersData] = useState(()=>LS.get("users_data",{}));
  const [pendingData, setPendingData] = useState(()=>LS.get("pending_data", INITIAL_PENDING));
  const [createdUsersData, setCreatedUsersData] = useState(()=>LS.get("created_users",[]));

  useEffect(()=>{
    const style = document.createElement("style");
    style.textContent = css;
    document.head.appendChild(style);
    // Khôi phục session
    const savedUserId = LS.get("current_user_id", null);
    if (savedUserId) {
      const savedUser = LS.get("users_data",{})[savedUserId] || MOCK_USERS[savedUserId];
      if (savedUser) { setUser(savedUser); setPage("dashboard"); }
    }
    return ()=>document.head.removeChild(style);
  },[]);

  const handleLogin = (u) => {
    const saved = LS.get("users_data",{})[u.id];
    const mergedUser = saved ? {...u,...saved} : u;
    LS.set("current_user_id", u.id);
    setUser(mergedUser);
    setPage("dashboard");
  };

  const handleLogout = () => {
    LS.set("current_user_id", null);
    setUser(null);
    setPage("landing");
  };

  const updateUser = (updatedUser) => {
    const data = LS.get("users_data",{});
    data[updatedUser.id] = updatedUser;
    LS.set("users_data", data);
    setUsersData(data);
    setUser(updatedUser);
  };

  const updatePending = (newList) => {
    LS.set("pending_data", newList);
    setPendingData(newList);
  };

  const updateCreatedUsers = (newList) => {
    LS.set("created_users", newList);
    setCreatedUsersData(newList);
  };

  if (page==="dashboard"&&user) return <Dashboard user={user} onLogout={handleLogout} onNavigate={setPage} onUpdateUser={updateUser} pendingData={pendingData} onUpdatePending={updatePending} createdUsersData={createdUsersData} onUpdateCreatedUsers={updateCreatedUsers}/>;
  if (page==="login") return <LoginPage onLogin={handleLogin} onNavigate={setPage}/>;
  if (page==="register") return <RegisterPage onNavigate={setPage} onUpdatePending={updatePending} pendingData={pendingData}/>;
  if (page==="store") return <StorePage onNavigate={setPage}/>;
  return <Landing onNavigate={setPage}/>;
}

// Mount React app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
